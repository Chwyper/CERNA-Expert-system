<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CERNA — Sistem Pakar Kesehatan Mental{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F7F5F2; --surface: #FFFFFF; --border: #E5E0D8;
            --sage: #4A7C6F; --sage-light: #EBF4F1; --sage-mid: #6A9E90;
            --ink: #1E1E1E; --ink-mid: #4A4845; --ink-muted: #8C8882; --ink-faint: #C8C4BE;
            --amber: #B8860B; --amber-bg: #FEF3CD;
            --rose: #C0545A; --rose-bg: #FDECEC;
            --purple: #7C5CBF; --purple-bg: #F0EBF8;
            --blue: #3A6EA5; --blue-bg: #E8F0F9;
            --orange: #C4714F; --orange-bg: #FBF0EB;
            --red: #C0392B; --red-bg: #FDEDEC;
            --radius-md: 14px; --radius-lg: 20px;
            --shadow-sm: 0 1px 3px rgba(30,24,18,.06); --shadow-md: 0 6px 24px rgba(30,24,18,.08);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink-mid); line-height: 1.65; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
        
        main { flex: 1; }

        /* HEADER */
        header {
            position: sticky; top: 0; z-index: 200;
            background: rgba(247,245,242,.92); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo { display: flex; align-items: center; gap: 10px; font-family: 'Lora', serif; font-size: 1.3rem; font-weight: 700; color: var(--ink); text-decoration: none; }
        .logo-mark { width: 30px; height: 30px; background: var(--sage); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
        .logo-mark svg { width: 16px; height: 16px; fill: white; }
        
        /* FOOTER */
        footer { border-top: 1px solid var(--border); padding: 1.5rem 2rem; text-align: center; font-size: 0.8rem; color: var(--ink-faint); margin-top: auto; }
        
        /* UTILS */
        .btn-primary { display: inline-flex; align-items: center; gap: 8px; background: var(--sage); color: white; border: none; border-radius: var(--radius-md); padding: .85rem 2rem; font-size: .95rem; font-family: 'Inter', sans-serif; font-weight: 500; cursor: pointer; transition: all .2s; text-decoration: none; justify-content: center; }
        .btn-primary:hover { background: var(--sage-mid); transform: translateY(-1px); }
        .btn-ghost { display: inline-flex; align-items: center; gap: 6px; background: transparent; color: var(--ink-mid); border: 1.5px solid var(--border); border-radius: var(--radius-md); padding: .7rem 1.4rem; font-size: .88rem; font-family: 'Inter', sans-serif; font-weight: 500; cursor: pointer; transition: all .2s; text-decoration: none; justify-content: center; }
        .btn-ghost:hover { background: var(--surface); border-color: var(--ink-faint); }
        .btn-sm { padding: .55rem 1.1rem; font-size: .82rem; }
        
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .anim { animation: fadeUp .5s cubic-bezier(.16,1,.3,1) both; }
        
        .bg-amber { color: var(--amber); background: var(--amber-bg); }
        .bg-rose { color: var(--rose); background: var(--rose-bg); }
        .bg-purple { color: var(--purple); background: var(--purple-bg); }
        .bg-blue { color: var(--blue); background: var(--blue-bg); }
        .bg-orange { color: var(--orange); background: var(--orange-bg); }
        .bg-red { color: var(--red); background: var(--red-bg); }
        .bg-sage { color: var(--sage); background: var(--sage-light); }
    </style>
    {% block style %}{% endblock %}
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <a href="/" class="logo">
            <div class="logo-mark">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
            </div>
            CERNA
        </a>
        {% block header_right %}
        <div class="header-right" style="display: flex; align-items: center; gap: .75rem;">
            <span style="font-size: 0.72rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-muted); background: var(--surface); border: 1px solid var(--border); padding: 4px 11px; border-radius: 20px;">Sistem Pakar</span>
        </div>
        {% endblock %}
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        &copy; 2026 CERNA — Sistem Pakar Diagnosa Kesehatan Mental &middot; ITENAS Bandung
    </footer>
</body>
</html>
