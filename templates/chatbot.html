{% extends 'base.html' %}
{% block title %}Asesmen Chatbot - CERNA{% endblock %}

{% block content %}
<style>
    .chat-container {
        height: 60vh;
        overflow-y: auto;
        padding: 1rem;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 16px;
        margin-bottom: 1rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }
    .chat-bubble {
        max-width: 80%;
        padding: 12px 18px;
        border-radius: 18px;
        line-height: 1.5;
        animation: fadeIn 0.3s ease-out;
    }
    .chat-user {
        align-self: flex-end;
        background: var(--sage);
        color: white;
        border-bottom-right-radius: 4px;
    }
    .chat-bot {
        align-self: flex-start;
        background: white;
        color: var(--dark);
        border: 1px solid rgba(132, 165, 157, 0.2);
        border-bottom-left-radius: 4px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .chat-input-area {
        background: white;
        padding: 12px;
        border-radius: 50px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        display: flex;
        gap: 10px;
        border: 1px solid rgba(132, 165, 157, 0.2);
    }
    .chat-input {
        flex: 1;
        border: none;
        background: transparent;
        padding: 0 15px;
        outline: none;
    }
    .btn-send {
        background: var(--sage);
        color: white;
        border: none;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
    }
    .btn-send:hover {
        background: var(--sage-dark);
        transform: scale(1.05);
    }
    
    .typing-indicator {
        display: none;
        padding: 12px 18px;
        background: rgba(255,255,255,0.7);
        border-radius: 18px;
        align-self: flex-start;
        width: fit-content;
    }
    .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--sage);
        animation: bounce 1.4s infinite ease-in-out both;
        margin: 0 2px;
    }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes bounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .diagnosa-card {
        margin-top: 10px;
        padding: 15px;
        background: var(--sage-light);
        border-radius: 12px;
        border: 1px solid var(--sage);
    }
</style>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex align-items-center mb-4">
            <a href="{{ url_for('pilih_metode') }}" class="btn btn-outline-sage rounded-circle me-3" style="width:40px; height:40px; padding:0; display:flex; align-items:center; justify-content:center;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </a>
            <h2 class="h4 mb-0 fw-bold">Asisten AI CERNA</h2>
        </div>

        <div class="card-glass p-3">
            <div class="chat-container" id="chatBox">
                <div class="chat-bubble chat-bot">
                    Halo! Saya CERNA AI. Ceritakan apa yang sedang Anda rasakan atau pikirkan belakangan ini. Jangan ragu untuk bercerita panjang lebar ya.
                </div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <form id="chatForm" class="mt-3">
                <div class="chat-input-area">
                    <input type="text" id="userInput" class="chat-input" placeholder="Ketik curhatan Anda di sini..." autocomplete="off">
                    <button type="submit" class="btn-send">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const chatForm = document.getElementById('chatForm');
    const userInput = document.getElementById('userInput');
    const chatBox = document.getElementById('chatBox');
    const typingIndicator = document.getElementById('typingIndicator');

    function addBubble(text, isUser) {
        const div = document.createElement('div');
        div.className = `chat-bubble ${isUser ? 'chat-user' : 'chat-bot'}`;
        div.innerHTML = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = userInput.value.trim();
        if(!text) return;

        // Tampilkan pesan user
        addBubble(text, true);
        userInput.value = '';
        
        // Tampilkan loading
        typingIndicator.style.display = 'block';
        chatBox.appendChild(typingIndicator);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pesan: text })
            });
            const data = await response.json();
            
            // Hilangkan loading
            typingIndicator.style.display = 'none';
            
            addBubble(data.balasan, false);
            
            // Jika ada hasil diagnosa, beri tombol untuk melihat detail (opsional)
            if(data.hasil) {
                // Di masa depan bisa dilink ke halaman detail
            }
            
        } catch(err) {
            typingIndicator.style.display = 'none';
            addBubble("Maaf, terjadi kesalahan pada server. Coba lagi nanti.", false);
        }
    });
</script>
{% endblock %}
