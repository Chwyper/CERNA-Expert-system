{% extends 'base.html' %}
{% block title %}Asesmen Chatbot - CERNA{% endblock %}

{% block content %}
<style>
    .chat-container {
        height: 60vh;
        overflow-y: auto;
        padding: 1rem;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 16px;
        margin-bottom: 1rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }
    .chat-bubble {
        max-width: 80%;
        padding: 12px 18px;
        border-radius: 18px;
        line-height: 1.5;
        animation: fadeIn 0.3s ease-out;
    }
    .chat-user {
        align-self: flex-end;
        background: var(--sage);
        color: white;
        border-bottom-right-radius: 4px;
    }
    .chat-bot {
        align-self: flex-start;
        background: white;
        color: var(--dark);
        border: 1px solid rgba(132, 165, 157, 0.2);
        border-bottom-left-radius: 4px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .chat-input-area {
        background: white;
        padding: 12px;
        border-radius: 50px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        display: flex;
        gap: 10px;
        border: 1px solid rgba(132, 165, 157, 0.2);
    }
    .chat-input {
        flex: 1;
        border: none;
        background: transparent;
        padding: 0 15px;
        outline: none;
    }
    .btn-send {
        background: var(--sage);
        color: white;
        border: none;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
    }
    .btn-send:hover {
        background: var(--sage-dark);
        transform: scale(1.05);
    }
    
    .typing-indicator {
        display: none;
        padding: 12px 18px;
        background: rgba(255,255,255,0.7);
        border-radius: 18px;
        align-self: flex-start;
        width: fit-content;
    }
    .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--sage);
        animation: bounce 1.4s infinite ease-in-out both;
        margin: 0 2px;
    }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes bounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .diagnosa-card {
        margin-top: 10px;
        padding: 15px;
        background: var(--sage-light);
        border-radius: 12px;
        border: 1px solid var(--sage);
    }
</style>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex align-items-center mb-4 justify-content-between">
            <div class="d-flex align-items-center">
                <a href="{{ url_for('pilih_metode') }}" class="btn btn-outline-sage rounded-circle me-3" style="width:40px; height:40px; padding:0; display:flex; align-items:center; justify-content:center;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </a>
                <h2 class="h4 mb-0 fw-bold">Asisten AI CERNA</h2>
            </div>
            <button onclick="resetChat()" class="btn btn-sm btn-outline-secondary rounded-pill" style="font-size:0.8rem; display:flex; align-items:center; gap:5px;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                Reset Topik
            </button>
        </div>

        <div class="card-glass p-3">
            <div class="chat-container" id="chatBox">
                <!-- Sapaan awal akan digenerate oleh JS -->
            </div>
            
            <div class="typing-indicator" id="typingIndicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <form id="chatForm" class="mt-3">
                <div class="chat-input-area">
                    <input type="text" id="userInput" class="chat-input" placeholder="Ketik curhatan Anda di sini..." autocomplete="off">
                    <button type="submit" class="btn-send">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const chatForm = document.getElementById('chatForm');
    const userInput = document.getElementById('userInput');
    const chatBox = document.getElementById('chatBox');
    const typingIndicator = document.getElementById('typingIndicator');

    function addBubble(text, isUser) {
        const div = document.createElement('div');
        div.className = `chat-bubble ${isUser ? 'chat-user' : 'chat-bot'}`;
        div.innerHTML = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Generate sapaan awal berbasis waktu
    window.addEventListener('DOMContentLoaded', () => {
        const hour = new Date().getHours();
        let sapaanWaktu = "Halo";
        if(hour >= 4 && hour < 11) sapaanWaktu = "Selamat pagi";
        else if(hour >= 11 && hour < 15) sapaanWaktu = "Selamat siang";
        else if(hour >= 15 && hour < 18) sapaanWaktu = "Selamat sore";
        else sapaanWaktu = "Selamat malam";
        
        addBubble(`${sapaanWaktu}! Saya CERNA AI. Ceritakan apa yang sedang Anda rasakan atau pikirkan belakangan ini. Jangan ragu untuk bercerita ya.`, false);
    });

    // Fungsi Tugas 2: Menampilkan Card Diagnosis secara interaktif dan dinamis
    function addDiagnosaCard(hasil) {
        const div = document.createElement('div');
        div.className = 'diagnosa-card';
        div.style.alignSelf = 'flex-start';
        div.style.width = '85%';
        div.style.boxShadow = 'var(--shadow-sm)';
        div.style.background = 'var(--surface)';
        div.style.border = '1px solid var(--border)';
        div.style.borderRadius = 'var(--radius-md)';
        div.style.padding = '18px';
        div.style.marginTop = '12px';
        div.style.animation = 'fadeUp 0.4s ease-out';
        
        div.innerHTML = `
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px;">
                <div style="width:10px; height:10px; border-radius:50%; background:var(--rose);"></div>
                <h5 style="margin:0; font-size:0.85rem; font-weight:600; color:var(--ink); text-transform:uppercase; letter-spacing:0.03em;">Hasil Analisis Gejala</h5>
            </div>
            
            <p style="margin:0 0 6px 0; font-size:1.1rem; font-weight:600; color:var(--ink); font-family:'Lora', serif;">${hasil.nama_penyakit}</p>
            
            <p style="margin:0 0 12px 0; font-size:0.85rem; color:var(--ink-mid); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">
                ${hasil.deskripsi}
            </p>
            
            <div style="margin-bottom:16px; font-size:0.85rem; color:var(--ink-mid); display:flex; align-items:center; justify-content:space-between;">
                <span>Kecocokan Gejala:</span> 
                <span style="background:var(--sage-light); color:var(--sage); padding:4px 10px; border-radius:12px; font-weight:600;">${hasil.keyakinan}%</span>
            </div>
            
            <a href="/penyakit/${hasil.kode_penyakit}" style="display:block; text-align:center; padding:10px; border-radius:50px; background:transparent; border:1.5px solid var(--rose); color:var(--rose); text-decoration:none; font-weight:600; font-size:0.85rem; transition:all 0.2s;" onmouseover="this.style.background='var(--rose-bg)'" onmouseout="this.style.background='transparent'">
                Lihat Detail Diagnosis
            </a>
        `;
        
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
    
    async function resetChat() {
        if(!confirm("Apakah Anda yakin ingin memulai topik obrolan baru? (Memori sesi akan dihapus)")) return;
        
        try {
            await fetch('/api/chat/reset', { method: 'POST' });
            chatBox.innerHTML = `
                <div class="chat-bubble chat-bot">
                    Baik, memori gejala sebelumnya telah dihapus. Mari mulai topik baru! Apa yang ingin Anda keluhkan sekarang?
                </div>
            `;
        } catch(err) {
            alert("Gagal mereset sesi.");
        }
    }

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = userInput.value.trim();
        if(!text) return;

        // Tampilkan pesan user
        addBubble(text, true);
        userInput.value = '';
        
        // Tampilkan loading
        typingIndicator.style.display = 'block';
        chatBox.appendChild(typingIndicator);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pesan: text })
            });
            const data = await response.json();
            
            // Kalkulasi simulasi waktu ngetik (1000ms s.d 2500ms) berdasarkan panjang kata
            let delayMs = 1000 + (data.balasan.length * 10);
            if(delayMs > 3000) delayMs = 3000;
            if(data.status === "success" && data.hasil) delayMs = 2500; // agak lama jika mikir penyakit
            
            setTimeout(() => {
                // Hilangkan loading
                typingIndicator.style.display = 'none';
                
                // Tampilkan balasan empati chatbot
                addBubble(data.balasan, false);
                
                // Pemicu tampilan desain Card jika diagnosis terdeteksi
                if(data.status === "success" && data.hasil) {
                    setTimeout(() => addDiagnosaCard(data.hasil), 600); // jeda sedikit sblm kartu muncul
                }
            }, delayMs);
            
        } catch(err) {
            typingIndicator.style.display = 'none';
            addBubble("Maaf, terjadi kesalahan pada server. Coba lagi nanti.", false);
        }
    });
</script>
{% endblock %}
