<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — CERNA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F7F5F2; --surface: #FFFFFF; --border: #E5E0D8;
            --sage: #4A7C6F; --sage-light: #EBF4F1; --sage-mid: #6A9E90;
            --ink: #1E1E1E; --ink-mid: #4A4845; --ink-muted: #8C8882;
            --red: #C0392B; --red-bg: #FDEDEC;
            --radius-md: 14px; --shadow-md: 0 6px 24px rgba(30,24,18,.09);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--ink-mid); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }

        .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: var(--shadow-md); }

        .login-logo { display: flex; align-items: center; gap: 10px; font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 700; color: var(--ink); margin-bottom: 1.75rem; }
        .logo-mark { width: 32px; height: 32px; background: var(--sage); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .logo-mark svg { width: 17px; height: 17px; fill: white; }

        h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 600; color: var(--ink); margin-bottom: .4rem; }
        .subtitle { font-size: .85rem; color: var(--ink-muted); margin-bottom: 2rem; }

        .field { margin-bottom: 1.1rem; }
        label { display: block; font-size: .82rem; font-weight: 600; color: var(--ink); margin-bottom: .4rem; letter-spacing: .02em; }
        input[type=text], input[type=password] {
            width: 100%; padding: .75rem 1rem; font-family: 'Outfit', sans-serif; font-size: .9rem;
            border: 1.5px solid var(--border); border-radius: var(--radius-md); background: var(--bg);
            color: var(--ink); outline: none; transition: border-color .2s;
        }
        input:focus { border-color: var(--sage); background: var(--surface); }

        .error-msg { background: var(--red-bg); border: 1px solid rgba(192,57,43,.2); color: var(--red); font-size: .83rem; border-radius: 10px; padding: .7rem 1rem; margin-bottom: 1.1rem; }

        .btn-login { width: 100%; padding: .85rem; background: var(--sage); color: white; border: none; border-radius: var(--radius-md); font-family: 'Outfit', sans-serif; font-size: .95rem; font-weight: 600; cursor: pointer; transition: background .2s; margin-top: .5rem; }
        .btn-login:hover { background: var(--sage-mid); }

        .back-link { display: block; text-align: center; margin-top: 1.25rem; font-size: .82rem; color: var(--ink-muted); text-decoration: none; }
        .back-link:hover { color: var(--ink); }

        .shield-icon { text-align: center; margin-bottom: 1.5rem; }
        .shield-icon svg { width: 40px; height: 40px; stroke: var(--sage); stroke-width: 1.5; fill: none; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .login-card { animation: fadeUp .4s cubic-bezier(.16,1,.3,1); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg></div>
            CERNA Admin
        </div>

        <div class="shield-icon">
            <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>

        <h2>Masuk ke Panel Admin</h2>
        <p class="subtitle">Halaman ini hanya dapat diakses oleh administrator sistem.</p>

        {% if error %}
        <div class="error-msg">⚠ {{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Masukkan username" autocomplete="username" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Masukkan password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login">Masuk ke Dashboard →</button>
        </form>

        <a href="/" class="back-link">← Kembali ke halaman utama</a>
    </div>
</body>
</html>
